spring:
  application:
    name: ai-application-generator
  profiles:
    active: local
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_application_generator
    username: root
    password: 123456
server:
  port: 8123
  servlet:
    context-path: /api
############## Sa-Token 配置 (文档: https://sa-token.cc) ##############
sa-token:
  # token 有效期（单位：秒） 7 天
  timeout: 604800
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: false
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # 是否输出操作日志
  is-log: true
logging:
  level:
    com.chipswu.aiapplicationgenerator: debug